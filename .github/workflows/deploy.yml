name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: aistockradar
  REGION: asia-east1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/aistockradar

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_LOCALE: zh-TW

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE:$GITHUB_SHA" \
            --tag "$IMAGE:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE:$GITHUB_SHA" \
            --platform managed \
            --region "$REGION" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "FMP_API_KEY=FMP_API_KEY:latest" \
            --set-secrets "FRED_API_KEY=FRED_API_KEY:latest" \
            --set-secrets "FIRESTORE_DATABASE=FIRESTORE_DATABASE:latest" \
            --set-secrets "GOOGLE_APPLICATION_CREDENTIALS_JSON=GOOGLE_APPLICATION_CREDENTIALS_JSON:latest"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --platform managed \
            --region "$REGION" \
            --format 'value(status.url)'
